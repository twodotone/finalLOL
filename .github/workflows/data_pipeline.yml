name: Run Projection Engine Pipeline

on:
  push:
    paths:
      - 'data/csv/**.csv'
    branches:
      - main
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy tqdm xgboost; fi

      - name: Run Feature Engineering & ELO Engine
        run: |
          python notebooks/02_feature_engineering_and_elo.py

      - name: Commit and Push Processed Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ models/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update processed data and models"
          git push
